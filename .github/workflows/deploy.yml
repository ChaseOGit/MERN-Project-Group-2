name: CI/CD Pipeline - Deploy to Droplet

# This tells GitHub to run this script whenever code is pushed (or merged) into the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into Droplet and Run Update Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # This runs the shortcut script we made earlier!
          script: |
            cd /var/www/MERN-Project-Group-2
            ./update.sh