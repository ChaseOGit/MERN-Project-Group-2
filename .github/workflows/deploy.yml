name: CI/CD Pipeline - Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into Droplet and Run Update Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Run the update commands directly instead of looking for update.sh
          script: |
            cd /var/www/MERN-Project-Group-2
            git pull origin main
            
            echo "Updating backend..."
            cd server
            npm install
            pm2 restart mern-backend
            
            echo "Updating frontend..."
            cd ../client
            npm install
            npm run build