<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App Icon Background -->
  <rect width="512" height="512" rx="115" fill="#000000"/>
  
  <!-- Subtle Grid/Circuit Background Pattern -->
  <path d="M0 128h512M0 256h512M0 384h512M128 0v512M256 0v512M384 0v512" stroke="#222222" stroke-width="4" fill="none"/>

  <!-- Glowing Screen Outline -->
  <rect x="110" y="140" width="292" height="180" rx="16" fill="#111111" stroke="#FFC904" stroke-width="32" stroke-linejoin="round"/>
  
  <!-- Laptop Base -->
  <path d="M 64 350 L 448 350 A 24 24 0 0 1 472 374 L 472 382 A 24 24 0 0 1 448 406 L 64 406 A 24 24 0 0 1 40 382 L 40 374 A 24 24 0 0 1 64 350 Z" fill="#FFC904"/>
  
  <!-- Trackpad -->
  <rect x="224" y="365" width="64" height="14" rx="7" fill="#000000" opacity="0.4"/>
  
  <!-- Lending / Sync Arrows inside Screen -->
  <g transform="translate(256, 230)">
    <!-- Top Left to Bottom Right Arrow -->
    <path d="M -40 -15 A 35 35 0 0 1 30 -25" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>
    <polygon points="20,-45 20,5 50,-20" fill="#FFFFFF"/>
    
    <!-- Bottom Right to Top Left Arrow -->
    <path d="M 40 15 A 35 35 0 0 1 -30 25" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>
    <polygon points="-20,45 -20,-5 -50,20" fill="#FFFFFF"/>
  </g>
</svg>